  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Admin | Local Boost Lab</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/Fav-Icon_Blue.png">
  <link rel="apple-touch-icon" href="/Fav-Icon_Blue.png">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { margin: 0; }

    /* Auth gate */
    .auth-gate { position: fixed; inset: 0; background: var(--authority-blue); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .auth-gate.hidden { display: none; }
    .ba-wrap { display: none; }
    .ba-wrap.show { display: block; }

    .ba-header { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: white; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 24px; gap: 16px; z-index: 100; }
    .ba-header__logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 0.9rem; color: var(--authority-blue); text-decoration: none; }
    .ba-header__title { font-size: 0.85rem; color: var(--text-muted); border-left: 1px solid var(--border-color); padding-left: 16px; }
    .ba-header__right { margin-left: auto; }
    .ba-main { padding-top: 56px; min-height: 100vh; background: var(--surface-light); }
    .ba-list { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .ba-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .ba-topbar h2 { font-size: 1.3rem; color: var(--authority-blue); margin: 0; }
    .ba-editor { display: flex; flex-direction: column; height: calc(100vh - 56px); overflow: hidden; }
    .ba-editor-topbar { display: flex; align-items: center; gap: 12px; padding: 12px 24px; background: white; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
    .ba-editor-topbar .right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .ba-meta { padding: 16px 24px; background: white; border-bottom: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-shrink: 0; }
    .ba-meta input, .ba-meta textarea { width: 100%; border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 8px 12px; font-family: var(--font-body); font-size: 0.875rem; box-sizing: border-box; }
    .ba-meta .title-row { grid-column: 1 / -1; }
    .ba-meta .title-row input { font-size: 1.2rem; font-weight: 700; border-color: transparent; border-bottom: 2px solid var(--border-color); border-radius: 0; padding-left: 0; }
    .ba-meta .title-row input:focus { outline: none; border-bottom-color: var(--authority-blue); }
    .ba-meta input:focus, .ba-meta textarea:focus { outline: none; border-color: var(--authority-blue); }
    .ba-split { display: flex; flex: 1; overflow: hidden; }
    .ba-write, .ba-preview { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .ba-write { border-right: 1px solid var(--border-color); }
    .ba-pane-label { padding: 8px 16px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); background: var(--surface-light); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
    .ba-toolbar { display: flex; gap: 2px; flex-wrap: wrap; padding: 4px 8px; }
    .ba-toolbar button { padding: 4px 10px; font-size: 0.78rem; font-weight: 600; border: 1px solid transparent; border-radius: 4px; color: var(--slate-core); background: none; cursor: pointer; font-family: var(--font-mono); }
    .ba-toolbar button:hover { background: var(--surface-mid); border-color: var(--border-color); }
    .ba-toolbar .sep { width: 1px; background: var(--border-color); margin: 4px 4px; }
    #post-body { flex: 1; resize: none; border: none; padding: 16px; font-family: var(--font-mono); font-size: 0.875rem; line-height: 1.7; background: #FAFBFC; outline: none; }
    .ba-preview-content { flex: 1; overflow-y: auto; padding: 24px 32px; }
    .prose { font-family: var(--font-body); font-size: 0.95rem; line-height: 1.8; color: var(--slate-core); max-width: 680px; }
    .prose h1, .prose h2 { font-family: var(--font-heading); color: var(--authority-blue); margin: 1.5em 0 0.5em; }
    .prose h2 { font-size: 1.4rem; }
    .prose h3 { font-size: 1.15rem; color: var(--authority-blue); margin: 1.2em 0 0.4em; }
    .prose p { margin: 0 0 1em; }
    .prose ul, .prose ol { padding-left: 1.5em; margin: 0 0 1em; }
    .prose blockquote { border-left: 4px solid var(--signal-amber); margin: 1em 0; padding: 8px 16px; background: var(--surface-light); color: var(--text-muted); font-style: italic; }
    .prose code { font-family: var(--font-mono); font-size: 0.85em; background: var(--surface-mid); padding: 2px 6px; border-radius: 4px; }
    .prose pre { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
    .prose hr { border: none; border-top: 2px solid var(--border-color); margin: 2em 0; }
    .prose a { color: var(--authority-blue); }
    .prose img { max-width: 100%; border-radius: 8px; }
    .slug-prefix { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    .save-indicator { font-size: 0.78rem; color: var(--text-muted); }
    .save-indicator.saved { color: var(--success-green); }
    .save-indicator.error { color: #EF4444; }
    .status-select { padding: 6px 12px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 0.85rem; font-family: var(--font-body); color: var(--authority-blue); font-weight: 600; }

    /* Table styles */
    .ba-table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-card); border: 1px solid var(--border-color); }
    .ba-table th { background: var(--surface-light); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
    .ba-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-color); font-size: 0.875rem; vertical-align: middle; }
    .ba-table tr:last-child td { border-bottom: none; }
    .ba-table tr:hover td { background: rgba(26,58,92,0.02); }
    .badge-published { display: inline-block; background: #D1FAE5; color: #065F46; font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .badge-draft { display: inline-block; background: #FEF3C7; color: #92400E; font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .btn-sm { padding: 5px 12px; font-size: 0.78rem; }
    .btn-delete { padding: 5px 10px; font-size: 0.78rem; background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font-body); font-weight: 600; transition: background 150ms; }
    .btn-delete:hover { background: #FECACA; }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); font-size: 0.95rem; }
    .loading-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }

    /* Back link */
    .back-link { font-size: 0.85rem; color: var(--authority-blue); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; background: none; border: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>

<!-- AUTH GATE -->
<div class="auth-gate" id="auth-gate">
  <div class="auth-gate__card">
    <div class="auth-gate__logo"><svg class="nav__logo-icon" width="22" height="28" viewBox="0 0 22 28" fill="none" aria-hidden="true"><path d="M11 0C4.925 0 0 4.925 0 11c0 7.333 10 17 11 17s11-9.667 11-17C22 4.925 17.075 0 11 0z" fill="#F59E0B"/><path d="M13 4L7 12H11L9 21L18 12H14L13 4Z" fill="white"/></svg>LOCAL BOOST LAB.</div>
    <div class="auth-gate__subtitle">Blog Admin · Restricted Access</div>
    <div class="form-group">
      <label class="form-label" for="pw-input">Password</label>
      <input type="password" id="pw-input" class="form-control" placeholder="Enter admin password" autocomplete="current-password">
      <div class="auth-gate__error" id="pw-error">Incorrect password. Try again.</div>
    </div>
    <button class="btn btn-primary btn-full btn-lg" onclick="checkAuth()">Sign In →</button>
  </div>
</div>

<!-- BLOG ADMIN APP -->
<div class="ba-wrap" id="ba-app">

  <!-- Header -->
  <header class="ba-header">
    <a href="/" class="ba-header__logo">
      <svg class="nav__logo-icon" width="20" height="26" viewBox="0 0 22 28" fill="none" aria-hidden="true"><path d="M11 0C4.925 0 0 4.925 0 11c0 7.333 10 17 11 17s11-9.667 11-17C22 4.925 17.075 0 11 0z" fill="#F59E0B"/><path d="M13 4L7 12H11L9 21L18 12H14L13 4Z" fill="white"/></svg>
      LOCAL BOOST LAB.
    </a>
    <span class="ba-header__title">Blog Admin</span>
    <div class="ba-header__right">
      <button class="btn btn-outline btn-sm" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <main class="ba-main">

    <!-- LIST VIEW -->
    <div id="view-list">
      <div class="ba-list">
        <div class="ba-topbar">
          <h2>Posts</h2>
          <button class="btn btn-primary" onclick="showEditor(null)">+ New Post</button>
        </div>
        <div id="posts-container">
          <div class="loading-state">Loading posts…</div>
        </div>
      </div>
    </div>

    <!-- EDITOR VIEW -->
    <div id="view-editor" style="display:none;">
      <div class="ba-editor">

        <!-- Editor top bar -->
        <div class="ba-editor-topbar">
          <button class="back-link" onclick="showList()">← Back to Posts</button>
          <span id="save-indicator" class="save-indicator"></span>
          <div class="right">
            <select id="post-status" class="status-select">
              <option value="draft">Draft</option>
              <option value="published">Published</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="savePost()">Save Post</button>
            <button id="btn-delete-post" class="btn-delete" onclick="deletePost()" style="display:none;">Delete</button>
          </div>
        </div>

        <!-- Meta fields -->
        <div class="ba-meta">
          <div class="title-row">
            <input type="text" id="post-title" placeholder="Post title…" oninput="handleTitleInput(this.value)">
          </div>
          <div>
            <input type="text" id="post-slug" placeholder="slug-here">
            <div class="slug-prefix">Slug: /blog/<span id="slug-display"></span></div>
          </div>
          <div>
            <input type="text" id="post-tags" placeholder="Tags: review-management, gbp-tips">
          </div>
          <div>
            <input type="url" id="post-cover-url" placeholder="Cover image URL (https://…)">
          </div>
          <div style="grid-column: 1 / -1;">
            <textarea id="post-excerpt" rows="2" placeholder="Excerpt — shown in blog card listings…"></textarea>
          </div>
          <div style="grid-column: 1 / -1;">
            <textarea id="post-meta-desc" rows="2" maxlength="160" placeholder="Meta description (max 160 chars — appears in Google search results)…"></textarea>
            <div class="slug-prefix" id="meta-desc-count">0 / 160</div>
          </div>
        </div>

        <!-- Split editor -->
        <div class="ba-split">
          <!-- Write pane -->
          <div class="ba-write">
            <div class="ba-pane-label">
              Write
              <div class="ba-toolbar">
                <button onclick="insertAtCursor('## ', '')" title="Heading 2">H2</button>
                <button onclick="insertAtCursor('### ', '')" title="Heading 3">H3</button>
                <div class="sep"></div>
                <button onclick="insertAtCursor('**', '**')" title="Bold"><strong>B</strong></button>
                <button onclick="insertAtCursor('*', '*')" title="Italic"><em>I</em></button>
                <div class="sep"></div>
                <button onclick="insertAtCursor('[', '](url)')" title="Link">Link</button>
                <button onclick="insertAtCursor('\n> ', '')" title="Blockquote">" Quote</button>
                <button onclick="insertAtCursor('\n- ', '')" title="List">• List</button>
                <button onclick="insertAtCursor('![alt](', ')')" title="Image">Image</button>
                <button onclick="insertAtCursor('\n---\n', '')" title="Horizontal Rule">─ HR</button>
                <div class="sep"></div>
                <button onclick="insertCtaButton()" title="CTA Button">⬛ Button</button>
                <button onclick="insertSnippet()" title="Info callout block">❝ Snippet</button>
              </div>
            </div>
            <textarea id="post-body" placeholder="Write your post in Markdown…" oninput="updatePreview()"></textarea>
          </div>

          <!-- Preview pane -->
          <div class="ba-preview">
            <div class="ba-pane-label">Preview</div>
            <div class="ba-preview-content">
              <div id="preview-content" class="prose"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </main>
</div>

<script>
  var API = 'https://powerful-balance-production-971d.up.railway.app';
  var ADMIN_KEY = 'lbl_admin_2026';
  var PASS = 'lbl_admin_2026';
  var currentPostId = null;

  /* ── Auth ─────────────────────────────────────────── */
  var RAILWAY = 'https://powerful-balance-production-971d.up.railway.app';
  if (window.location.hostname !== 'powerful-balance-production-971d.up.railway.app') {
    window.location.replace(RAILWAY + '/blog-admin.html');
  } else if (localStorage.getItem('lbl_authed') === PASS) {
    showApp();
  }

  function checkAuth() {
    var val = document.getElementById('pw-input').value;
    if (val === PASS) {
      localStorage.setItem('lbl_authed', PASS);
      showApp();
    } else {
      document.getElementById('pw-error').style.display = 'block';
      document.getElementById('pw-input').classList.add('invalid');
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkAuth();
  });

  function showApp() {
    document.getElementById('auth-gate').classList.add('hidden');
    document.getElementById('ba-app').classList.add('show');
    loadPosts();
  }

  function signOut() {
    localStorage.removeItem('lbl_authed');
    location.reload();
  }

  /* ── Date Formatting ─────────────────────────────── */
  function formatDate(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  /* ── Slug generation ─────────────────────────────── */
  function toSlug(str) {
    return str.toLowerCase()
      .replace(/[^a-z0-9\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
  }

  var slugManuallyEdited = false;

  function handleTitleInput(val) {
    document.getElementById('slug-display').textContent = '';
    if (!slugManuallyEdited) {
      var slug = toSlug(val);
      document.getElementById('post-slug').value = slug;
      document.getElementById('slug-display').textContent = slug;
    }
  }

  document.getElementById('post-slug').addEventListener('input', function() {
    slugManuallyEdited = true;
    document.getElementById('slug-display').textContent = this.value;
  });

  /* ── Load Posts ──────────────────────────────────── */
  function loadPosts() {
    var container = document.getElementById('posts-container');
    container.innerHTML = '<div class="loading-state">Loading posts…</div>';
    fetch(API + '/api/blog', {
      headers: { 'X-Admin-Key': ADMIN_KEY }
    })
    .then(function(r) { return r.json(); })
    .then(function(posts) {
      if (!posts.length) {
        container.innerHTML = '<div class="empty-state">No posts yet. <a href="#" onclick="showEditor(null);return false;" style="color:var(--authority-blue);font-weight:600;">Create your first post →</a></div>';
        return;
      }
      var rows = posts.map(function(p) {
        var statusBadge = p.status === 'published'
          ? '<span class="badge-published">Published</span>'
          : '<span class="badge-draft">Draft</span>';
        var tags = (p.tags || []).join(', ') || '—';
        var pub = formatDate(p.published_at);
        return '<tr>' +
          '<td style="font-weight:600;color:var(--authority-blue);">' + escHtml(p.title) + '</td>' +
          '<td>' + statusBadge + '</td>' +
          '<td style="font-size:0.82rem;color:var(--text-muted);">' + pub + '</td>' +
          '<td style="font-size:0.82rem;color:var(--text-muted);max-width:200px;">' + escHtml(tags) + '</td>' +
          '<td style="white-space:nowrap;">' +
            '<button class="btn btn-outline btn-sm" onclick="editPost(' + JSON.stringify(p).replace(/"/g,'&quot;') + ')">Edit</button> ' +
            '<button class="btn-delete" onclick="deletePostById(' + p.id + ')">×</button>' +
          '</td>' +
        '</tr>';
      }).join('');
      container.innerHTML = '<table class="ba-table">' +
        '<thead><tr><th>Title</th><th>Status</th><th>Published</th><th>Tags</th><th>Actions</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
        '</table>';
    })
    .catch(function(e) {
      container.innerHTML = '<div class="empty-state" style="color:#EF4444;">Failed to load posts: ' + e.message + '</div>';
    });
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Show Editor ──────────────────────────────────── */
  function showEditor(post) {
    currentPostId = post ? post.id : null;
    slugManuallyEdited = false;

    document.getElementById('post-title').value = post ? (post.title || '') : '';
    document.getElementById('post-slug').value = post ? (post.slug || '') : '';
    document.getElementById('slug-display').textContent = post ? (post.slug || '') : '';
    document.getElementById('post-excerpt').value = post ? (post.excerpt || '') : '';
    document.getElementById('post-tags').value = post ? (post.tags || []).join(', ') : '';
    document.getElementById('post-cover-url').value = post ? (post.cover_image_url || '') : '';
    document.getElementById('post-meta-desc').value = post ? (post.meta_description || '') : '';
    document.getElementById('meta-desc-count').textContent = (post && post.meta_description ? post.meta_description.length : 0) + ' / 160';
    document.getElementById('post-body').value = post ? (post.body || '') : '';
    document.getElementById('post-status').value = post ? (post.status || 'draft') : 'draft';
    document.getElementById('save-indicator').textContent = '';
    document.getElementById('save-indicator').className = 'save-indicator';
    document.getElementById('btn-delete-post').style.display = currentPostId ? 'inline-block' : 'none';

    updatePreview();

    document.getElementById('view-list').style.display = 'none';
    document.getElementById('view-editor').style.display = 'block';
  }

  function editPost(post) {
    fetch(API + '/api/blog/' + post.slug)
      .then(function(r) { return r.json(); })
      .then(function(full) { showEditor(full); })
      .catch(function() { showEditor(post); });
  }

  /* ── Show List ────────────────────────────────────── */
  function showList() {
    document.getElementById('view-editor').style.display = 'none';
    document.getElementById('view-list').style.display = 'block';
    loadPosts();
  }

  /* ── Save Post ────────────────────────────────────── */
  function savePost() {
    var indicator = document.getElementById('save-indicator');
    indicator.textContent = 'Saving…';
    indicator.className = 'save-indicator';

    var payload = {
      title: document.getElementById('post-title').value.trim(),
      slug: document.getElementById('post-slug').value.trim(),
      excerpt: document.getElementById('post-excerpt').value.trim(),
      body: document.getElementById('post-body').value,
      tags: document.getElementById('post-tags').value,
      status: document.getElementById('post-status').value,
      cover_image_url: document.getElementById('post-cover-url').value.trim() || null,
      meta_description: document.getElementById('post-meta-desc').value.trim() || null
    };

    if (!payload.title) { indicator.textContent = 'Title required'; indicator.className = 'save-indicator error'; return; }
    if (!payload.slug)  { indicator.textContent = 'Slug required';  indicator.className = 'save-indicator error'; return; }

    var url    = currentPostId ? API + '/api/blog/' + currentPostId : API + '/api/blog';
    var method = currentPostId ? 'PUT' : 'POST';

    fetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
      body: JSON.stringify(payload)
    })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || r.status); });
      return r.json();
    })
    .then(function(data) {
      indicator.textContent = 'Saved';
      indicator.className = 'save-indicator saved';
      if (!currentPostId) {
        currentPostId = data.id;
        document.getElementById('btn-delete-post').style.display = 'inline-block';
      }
      setTimeout(function() { showList(); }, 800);
    })
    .catch(function(e) {
      indicator.textContent = 'Error: ' + e.message;
      indicator.className = 'save-indicator error';
    });
  }

  /* ── Delete Post ──────────────────────────────────── */
  function deletePost() {
    if (!currentPostId) return;
    if (!confirm('Delete this post? This cannot be undone.')) return;
    deletePostById(currentPostId);
  }

  function deletePostById(id) {
    if (!confirm('Delete this post? This cannot be undone.')) return;
    fetch(API + '/api/blog/' + id, {
      method: 'DELETE',
      headers: { 'X-Admin-Key': ADMIN_KEY }
    })
    .then(function(r) { return r.json(); })
    .then(function() { showList(); })
    .catch(function(e) { alert('Delete failed: ' + e.message); });
  }

  /* ── Markdown Preview ─────────────────────────────── */
  function updatePreview() {
    var body = document.getElementById('post-body').value;
    document.getElementById('preview-content').innerHTML = marked.parse(body || '');
  }

  /* ── Toolbar: Insert at cursor ────────────────────── */
  function insertAtCursor(prefix, suffix) {
    var ta = document.getElementById('post-body');
    var start = ta.selectionStart;
    var end   = ta.selectionEnd;
    var sel   = ta.value.substring(start, end);
    var replacement = prefix + sel + suffix;
    ta.value = ta.value.substring(0, start) + replacement + ta.value.substring(end);
    ta.selectionStart = start + prefix.length;
    ta.selectionEnd   = start + prefix.length + sel.length;
    ta.focus();
    updatePreview();
  }

  function insertCtaButton() {
    var text = prompt('Button label:', 'Get Started →');
    if (!text) return;
    var url = prompt('Button URL:', 'https://www.localboostlab.com/pricing.html');
    if (!url) return;
    insertAtCursor('\n<a href="' + url + '" style="display:inline-block;background:#1A3A5C;color:white;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:700;font-size:0.9rem;margin:8px 0;">' + text + '</a>\n', '');
  }

  function insertSnippet() {
    var placeholder = document.getElementById('post-body').selectionStart !== document.getElementById('post-body').selectionEnd
      ? '' : 'Your key insight or callout text here.';
    insertAtCursor('\n<div style="background:#EFF6FF;border-left:4px solid #1A3A5C;padding:16px 20px;border-radius:0 8px 8px 0;margin:1.5em 0;font-size:0.95rem;">\n\n', '\n\n</div>\n');
  }

  /* ── Meta description char counter ───────────────── */
  document.getElementById('post-meta-desc').addEventListener('input', function() {
    document.getElementById('meta-desc-count').textContent = this.value.length + ' / 160';
  });
</script>
</body>
</html>
